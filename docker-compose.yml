services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wifi_lambda_app
    restart: unless-stopped
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    volumes:
      - .env:/app/.env
      - storage_data:/app/storage
    ports:
      - "8000:80"
    depends_on:
      - db
      - redis

  db:
    image: mysql:8.0
    container_name: wifi_lambda_db
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=${DB_DATABASE:-wifi_lambda}
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD}
      - MYSQL_PASSWORD=${DB_PASSWORD}
      - MYSQL_USER=${DB_USERNAME:-laravel}
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis:alpine
    container_name: wifi_lambda_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  storage_data:
  db_data:
  redis_data:
